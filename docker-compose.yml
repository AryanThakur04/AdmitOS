services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admitos
      POSTGRES_PASSWORD: admitos_secret
      POSTGRES_DB: admitos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admitos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admitos:admitos_secret@db:5432/admitos
      SECRET_KEY: demo-secret-key-change-in-prod
      CORS_ORIGINS: http://localhost:5173
      AI_PROVIDER: gemini
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
