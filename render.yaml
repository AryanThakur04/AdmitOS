# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: admitos-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: admitos-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://admitos-web.onrender.com

  - type: web
    name: admitos-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://admitos-api.onrender.com

databases:
  - name: admitos-db
    plan: free
    databaseName: admitos
    user: admitos
